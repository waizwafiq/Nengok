name: SDK CI

on:
  pull_request:
    branches: [main]
    paths:
      - "nengok/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/sdk-ci.yml"
  push:
    branches-ignore:
      - "docs/**"
    paths:
      - "nengok/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/sdk-ci.yml"

concurrency:
  group: sdk-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check if CI is needed
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.commit_check.outputs.should_run }}
    steps:
      - name: Check commit message
        id: commit_check
        env:
          # Pass the head-commit message via env, never via `${{ ... }}`
          # interpolation into the script. Squash-merge commit messages are
          # multi-line and frequently contain code fragments; inlining them
          # into a bash heredoc executes those fragments as shell commands
          # (and is a script-injection vector).
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s\n' "$COMMIT_MSG" | head -1 | grep -qiE '^docs(\(.*\))?:'; then
            echo "Skipping CI (docs-only commit)"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Ruff check + format
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: Ruff check
        run: ruff check nengok tests sample_agent

      - name: Ruff format --check
        run: ruff format --check nengok tests sample_agent

  type-check:
    name: mypy
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e ".[dev]"

      - name: mypy
        run: mypy nengok

  migration-namespace-lint:
    name: Migration namespace linter
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e ".[dev]"

      - name: Run namespace linters (fail fast on guest-DB rule violations)
        run: pytest tests/test_migration_namespace.py tests/test_alembic_version_namespace.py -v --tb=short

  test:
    name: pytest sqlite (${{ matrix.os }}, Python ${{ matrix.python-version }})
    needs: [check, migration-namespace-lint]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  test-postgres:
    name: pytest postgres (Python 3.12, Ubuntu)
    needs: [check, migration-namespace-lint]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nengok
          POSTGRES_PASSWORD: nengok
          POSTGRES_DB: nengok
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nengok -d nengok"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://nengok:nengok@127.0.0.1:5432/nengok?sslmode=disable
      NENGOK_TEST_POSTGRES_URL: postgresql+psycopg://nengok:nengok@127.0.0.1:5432/nengok?sslmode=disable
      PHOENIX_BASE_URL: http://localhost:6006
      GOOGLE_API_KEY: AIzaTEST-key-for-unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e ".[dev]"

      - name: Apply Alembic migrations against Postgres
        run: nengok db migrate

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  test-mysql:
    name: pytest mysql (Python 3.12, Ubuntu)
    needs: [check, migration-namespace-lint]
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: nengok
          MYSQL_USER: nengok
          MYSQL_PASSWORD: nengok
          MYSQL_DATABASE: nengok
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -unengok -pnengok"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: mysql+pymysql://nengok:nengok@127.0.0.1:3306/nengok
      NENGOK_TEST_MYSQL_URL: mysql+pymysql://nengok:nengok@127.0.0.1:3306/nengok
      NENGOK_DATABASE_ALLOW_PLAINTEXT: "1"
      PHOENIX_BASE_URL: http://localhost:6006
      GOOGLE_API_KEY: AIzaTEST-key-for-unit-tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e ".[dev]"

      - name: Apply Alembic migrations against MySQL
        run: nengok db migrate

      - name: Run unit tests
        run: pytest tests/ -v --tb=short

  test-full-extras:
    name: pytest with [dev,gemini,phoenix]
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev + gemini + phoenix extras
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e ".[dev,gemini,phoenix]"

      - name: Verify optional extras are actually importable
        run: |
          python -c "import google.genai.errors; import phoenix.client.resources.experiments"

      - name: Run unit tests (gemini and phoenix tests must run, not skip)
        run: pytest tests/ -v --tb=short

  import-check:
    name: SDK imports cleanly
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e .

      - name: Verify CLI is reachable
        run: nengok --help

  pip-audit:
    name: pip-audit (no CVEs)
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e ".[dev]"

      - name: pip-audit
        # Uninstall the editable nengok install before auditing so pip-audit
        # never has to skip it. `--skip-editable` produces a Linux exit-1
        # whether or not `--strict` is set, so taking nengok out of the
        # picture entirely is the only invocation that stays portable.
        # Real dependency CVEs still exit 1, which is the gate we want.
        run: |
          pip install pip-audit
          pip uninstall -y nengok
          pip-audit

  bandit:
    name: bandit security scan
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install 'bandit[toml]'

      - name: Scan nengok/ (config from pyproject.toml)
        run: bandit -r nengok/ -c pyproject.toml

      - name: Scan tests/ and phoenix_harness/ (skip test-only false positives)
        # B101 asserts; B104 0.0.0.0 binding under test; B106 literal test
        # tokens; B108 tmp_path fixtures.
        run: bandit -r tests/ phoenix_harness/ --skip B101,B104,B106,B108

  smoke-install:
    name: Smoke install (wheel)
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build

      - name: Build wheel
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: python -m build --wheel

      - name: Install wheel in clean venv
        run: |
          python -m venv .smoke-venv
          .smoke-venv/bin/pip install dist/*.whl

      - name: Smoke test CLI
        run: |
          .smoke-venv/bin/nengok --version
          .smoke-venv/bin/nengok init --help
