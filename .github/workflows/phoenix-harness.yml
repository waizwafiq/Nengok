name: Phoenix Harness

on:
  pull_request:
    branches: [main]
    paths:
      - "nengok/phoenix/**"
      - "phoenix_harness/**"
      - "pyproject.toml"
      - ".github/workflows/phoenix-harness.yml"
  push:
    branches-ignore:
      - "docs/**"
    paths:
      - "nengok/phoenix/**"
      - "phoenix_harness/**"
      - "pyproject.toml"
      - ".github/workflows/phoenix-harness.yml"
  workflow_dispatch:

concurrency:
  group: phoenix-harness-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check if harness should run
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Gate on PHOENIX_BASE_URL secret
        id: gate
        env:
          PHOENIX_BASE_URL: ${{ secrets.PHOENIX_BASE_URL }}
        run: |
          if [ -z "$PHOENIX_BASE_URL" ]; then
            echo "PHOENIX_BASE_URL secret not configured — skipping live harness"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  harness:
    name: Live Phoenix integration tests
    needs: check
    if: needs.check.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment: phoenix-harness
    # The harness exercises Phoenix only and does not import from
    # nengok.state, so the multi-backend matrix that sdk-ci runs
    # against Postgres and MySQL is not replicated here. Any future
    # test that touches state.* should move to tests/ (matrixed) or
    # add an opt-in service container alongside this job.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install package + dev extras
        env:
          NENGOK_SKIP_FRONTEND_BUILD: "1"
        run: pip install -e ".[dev]"

      - name: Run harness
        env:
          PHOENIX_BASE_URL: ${{ secrets.PHOENIX_BASE_URL }}
          PHOENIX_API_KEY: ${{ secrets.PHOENIX_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: pytest phoenix_harness/ -v --tb=short -m "not slow"
