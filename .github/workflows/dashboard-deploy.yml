name: Dashboard Deploy (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "nengok/server/**"
      - "frontend/**"
      - "deploy/**"
      - ".github/workflows/dashboard-deploy.yml"
  workflow_dispatch:

concurrency:
  group: dashboard-${{ github.ref_name }}
  cancel-in-progress: true

env:
  GCP_REGION: asia-southeast1
  SERVICE_NAME: nengok-dashboard

jobs:
  check:
    name: Check if deploy is needed
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.gate.outputs.should_deploy }}
    steps:
      - name: Gate on commit message + secrets
        id: gate
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          # Pass the head-commit message via env, never via `${{ ... }}`
          # interpolation into the script. Squash-merge commit messages are
          # multi-line and frequently contain code fragments; inlining them
          # into a bash heredoc executes those fragments as shell commands
          # (and is a script-injection vector).
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          if printf '%s\n' "$COMMIT_MSG" | head -1 | grep -qiE '^docs(\(.*\))?:'; then
            echo "Skipping deploy (docs-only commit)"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$GCP_PROJECT_ID" ]; then
            echo "GCP_PROJECT_ID secret not configured, skipping deploy"
            echo "should_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_deploy=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Build + deploy to Cloud Run
    needs: check
    if: needs.check.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment: cloud-run
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build dashboard image
        run: |
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nengok/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -f deploy/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - name: Render Cloud Run manifest
        run: |
          sed -e "s|REPLACED_BY_CI|$IMAGE|g" \
              -e "s|PROJECT_ID|${{ secrets.GCP_PROJECT_ID }}|g" \
              deploy/cloud-run.yaml > /tmp/cloud-run.rendered.yaml
          cat /tmp/cloud-run.rendered.yaml

      - name: Deploy to Cloud Run
        # The service is multi-container (dashboard + Managed Prometheus
        # collector sidecar) with Secret Manager bindings, which cannot be
        # expressed as `gcloud run deploy` flags, so apply the manifest instead.
        run: |
          gcloud run services replace /tmp/cloud-run.rendered.yaml \
            --region ${{ env.GCP_REGION }} \
            --platform managed

      - name: Allow unauthenticated access
        # `services replace` does not honor --allow-unauthenticated, so the
        # public-invoker binding is (idempotently) granted via IAM.
        run: |
          gcloud run services add-iam-policy-binding ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --member="allUsers" \
            --role="roles/run.invoker"
