version: "3.9"

# Optional local Postgres for developers who want to validate the
# Postgres path before pointing Nengok at a hosted instance.
# The default OSS install does not need this: SQLite at ~/.nengok/state.db
# is the zero-setup path. Bring this up only when you want to exercise
# the Postgres dialect locally.
#
# Quick start:
#   docker compose -f deploy/local/docker-compose.postgres.yml up -d
#   export DATABASE_URL="postgresql+psycopg://nengok:nengok@127.0.0.1:55432/nengok?sslmode=disable"
#   nengok db migrate
#   nengok run
#
# The migrate sidecar runs once after the Postgres container becomes
# healthy and then exits, so a second `up -d` is a no-op.

services:
  postgres:
    image: postgres:16-alpine
    container_name: nengok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nengok
      POSTGRES_PASSWORD: nengok
      POSTGRES_DB: nengok
    ports:
      - "55432:5432"
    volumes:
      - nengok_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nengok -d nengok"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: python:3.12-slim
    container_name: nengok-postgres-migrate
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    environment:
      DATABASE_URL: "postgresql+psycopg://nengok:nengok@postgres:5432/nengok?sslmode=disable"
      DATABASE_ALLOW_PLAINTEXT: "1"
    command: >
      sh -c "pip install --quiet -e . && nengok db migrate"
    restart: "no"

volumes:
  nengok_postgres_data:
