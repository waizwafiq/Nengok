version: "3.9"

# Optional local MySQL for developers who want to validate the
# MySQL path before pointing Nengok at a hosted instance.
# The default OSS install does not need this: SQLite at ~/.nengok/state.db
# is the zero-setup path. Bring this up only when you want to exercise
# the MySQL dialect locally.
#
# Quick start:
#   docker compose -f deploy/local/docker-compose.mysql.yml up -d
#   export DATABASE_URL="mysql+pymysql://nengok:nengok@127.0.0.1:53306/nengok"
#   nengok db migrate
#   nengok run
#
# The migrate sidecar runs once after MySQL passes its health probe
# and then exits, so a second `up -d` is a no-op.

services:
  mysql:
    image: mysql:8.0
    container_name: nengok-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_ROOT_PASSWORD: nengok-root
      MYSQL_USER: nengok
      MYSQL_PASSWORD: nengok
      MYSQL_DATABASE: nengok
    ports:
      - "53306:3306"
    volumes:
      - nengok_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-unengok", "-pnengok"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    image: python:3.12-slim
    container_name: nengok-mysql-migrate
    depends_on:
      mysql:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - ../..:/workspace
    environment:
      DATABASE_URL: "mysql+pymysql://nengok:nengok@mysql:3306/nengok"
      DATABASE_ALLOW_PLAINTEXT: "1"
    command: >
      sh -c "pip install --quiet -e . && nengok db migrate"
    restart: "no"

volumes:
  nengok_mysql_data:
