apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nengok-dashboard
  annotations:
    run.googleapis.com/launch-stage: BETA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        - image: REPLACED_BY_CI
          ports:
            - name: http1
              containerPort: 8765
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: NENGOK_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: NENGOK_DASHBOARD_PORT
              value: "8765"
