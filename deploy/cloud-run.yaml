apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: nengok-dashboard
  annotations:
    # The Managed Service for Prometheus sidecar integration for Cloud Run is a
    # launch-stage ALPHA feature.
    run.googleapis.com/launch-stage: ALPHA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        run.googleapis.com/execution-environment: gen2
        # Keep the collector running on a scaled-to-zero instance long enough to
        # flush its final scrape.
        run.googleapis.com/cpu-throttling: "false"
        # Start the collector only once the app container is up.
        run.googleapis.com/container-dependencies: '{"collector":["app"]}'
        # Map the Secret Manager secrets bound below. PROJECT_ID is substituted
        # by the deploy step (CI or scripts/deploy).
        run.googleapis.com/secrets: "nengok-phoenix-api-key:projects/PROJECT_ID/secrets/nengok-phoenix-api-key,nengok-dashboard-token:projects/PROJECT_ID/secrets/nengok-dashboard-token,nengok-gmp-config:projects/PROJECT_ID/secrets/nengok-gmp-config"
    spec:
      containerConcurrency: 20
      timeoutSeconds: 60
      containers:
        # --- ingress container: the FastAPI approval dashboard ----------------
        - name: app
          image: REPLACED_BY_CI
          ports:
            - name: http1
              containerPort: 8765
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
          env:
            - name: NENGOK_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: NENGOK_DASHBOARD_PORT
              value: "8765"
            # Expose /metrics so the collector sidecar can scrape it.
            - name: NENGOK_METRICS_ENABLED
              value: "true"
            # Required for the dashboard to boot. Point this at your Phoenix
            # instance; reachability is reported on /health but is not required
            # to serve the approval UI.
            - name: PHOENIX_BASE_URL
              value: "https://app.phoenix.arize.com"
            # Route Gemini through Vertex AI using the Cloud Run runtime service
            # account (Application Default Credentials) — no API key needed.
            - name: GOOGLE_GENAI_USE_VERTEXAI
              value: "true"
            - name: GOOGLE_CLOUD_PROJECT
              value: "PROJECT_ID"
            - name: GOOGLE_CLOUD_LOCATION
              value: "global"
            # Secrets bound from Secret Manager at deploy time (no key on disk).
            - name: PHOENIX_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nengok-phoenix-api-key
                  key: latest
            - name: NENGOK_DASHBOARD_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nengok-dashboard-token
                  key: latest
          livenessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 4
            failureThreshold: 3
        # --- sidecar: Managed Service for Prometheus collector ----------------
        - name: collector
          image: us-docker.pkg.dev/cloud-ops-agents-artifacts/cloud-run-gmp-sidecar/cloud-run-gmp-sidecar:1.2.0
          resources:
            limits:
              cpu: "250m"
              memory: 256Mi
          volumeMounts:
            - mountPath: /etc/rungmp/
              name: gmp-config
          livenessProbe:
            httpGet:
              path: /liveness
              port: 13133
            timeoutSeconds: 30
            periodSeconds: 30
      volumes:
        - name: gmp-config
          secret:
            secretName: nengok-gmp-config
            items:
              - key: latest
                path: config.yaml
